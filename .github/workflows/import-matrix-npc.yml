name: Import Matrix NPC F4b (one-off)

# Importuje NPC bio stranky do Ikaros sveta 'matrix' a napoji je na postavy.
# Data: migration/f4b-npc-pages.json.gz.
#
# Logika: pro kazdou NPC stranku najde Character podle slug (z F3); kdyz
# karta neexistuje (NPC jen se strankou, bez statu), DOVYTVORI ji (isNpc).
# Page dostane characterRef={characterId}. Vse tagovane _mig:'f4b'.
#
# BEZPECNOST: idempotentni (existujici slug stranky preskoci), dry-run default,
# rollback maze pages I dovytvorene karty s _mig:'f4b' (karty z F3 _mig:f3 netkne).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'rezim'
        type: choice
        options: [dry-run, import, rollback]
        default: dry-run
      confirm:
        description: 'pro import napis IMPORT, pro rollback ROLLBACK'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (kvuli datovemu souboru)
        uses: actions/checkout@v4
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Build mongosh script
        env:
          MODE: ${{ github.event.inputs.mode }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -e
          if [ "$MODE" = "rollback" ]; then
            if [ "$CONFIRM" != "ROLLBACK" ]; then echo "CHYBA: rollback vyzaduje confirm=ROLLBACK"; exit 1; fi
            {
              echo 'const rp=db.pages.deleteMany({worldId:"matrix",_mig:"f4b"});'
              echo 'const rc=db.characters.deleteMany({worldId:"matrix",_mig:"f4b"});'
              echo 'print("ROLLBACK: smazano pages="+rp.deletedCount+" vytvorene-karty="+rc.deletedCount);'
            } > script.js
          else
            DRY=true
            if [ "$MODE" = "import" ]; then
              if [ "$CONFIRM" != "IMPORT" ]; then echo "CHYBA: import vyzaduje confirm=IMPORT"; exit 1; fi
              DRY=false
            fi
            {
              echo "const DRY=$DRY;"
              echo "const docs ="
              gunzip -c migration/f4b-npc-pages.json.gz
              echo ";"
              echo 'let ins=0,skip=0,linked=0,created=0,would=0;'
              echo 'for(const p of docs){'
              echo '  const ex=db.pages.findOne({worldId:"matrix",slug:p.slug},{_id:1});'
              echo '  if(ex){skip++;continue;}'
              echo '  if(DRY){would++;continue;}'
              echo '  const now=new Date();'
              echo '  let ch=db.characters.findOne({worldId:"matrix",slug:p.slug},{_id:1});'
              echo '  let charId;'
              echo '  if(ch){charId=ch._id;linked++;}'
              echo '  else{const cr=db.characters.insertOne({slug:p.slug,name:p.title,worldId:"matrix",isNpc:true,kind:"persona",diaryData:{},extraBlocks:[],customData:{},preferredCalendarConfigId:null,_mig:"f4b",createdAt:now,updatedAt:now});charId=cr.insertedId;created++;}'
              echo '  db.pages.insertOne(Object.assign({},p,{characterRef:{characterId:String(charId)},_mig:"f4b",createdAt:now,updatedAt:now}));'
              echo '  ins++;'
              echo '}'
              echo 'print(DRY?("DRY-RUN: vlozilo by se "+would+" stranek, preskoceno "+skip+", v souboru "+docs.length):("IMPORT HOTOVO: vlozeno "+ins+" stranek (napojeno na kartu "+linked+", dovytvoreno karet "+created+"), preskoceno "+skip));'
            } > script.js
          fi
          echo "skript pripraven ($(du -h script.js | cut -f1))"
      - name: Run on newmatrix
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < script.js
