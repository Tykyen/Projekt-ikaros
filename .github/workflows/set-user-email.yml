name: Set user email (one-off)

# Cilena zmena emailu jednoho uctu primo v DB. Vznik: migrovani Matrix hraci
# maji nedorucitelny placeholder email (jmeno@matrix.invalid), takze jim
# nefunguje self-service obnova hesla pres mail. Tady nastavime realny email,
# aby hrac mohl pouzit "Zapomenute heslo" (az pobezi SMTP).
#
# Bezpecne: matchuje podle presneho _id, kontroluje kolizi emailu, hesla se
# nedotyka. Nastavi email + emailVerified=true.
#
# Spusteni: Actions -> "Set user email (one-off)" -> Run workflow ->
#   userId   = _id uctu (z URL profilu /ikaros/uzivatel/<ID>)
#   newEmail = novy email
#   confirm  = napis SET
# -> Run.

on:
  workflow_dispatch:
    inputs:
      userId:
        description: '_id uctu (z URL profilu)'
        required: true
        default: '6a23f4f4f01021af8f8ce5c2'
      newEmail:
        description: 'Novy email'
        required: true
        default: ''
      confirm:
        description: 'Napis SET pro potvrzeni'
        required: true
        default: ''

jobs:
  set-email:
    if: ${{ github.event.inputs.confirm == 'SET' }}
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Build + run set-email script
        env:
          USER_ID: ${{ github.event.inputs.userId }}
          NEW_EMAIL: ${{ github.event.inputs.newEmail }}
        run: |
          cat > set-email.js <<EOF
          const userId = "${USER_ID}";
          const newEmail = "${NEW_EMAIL}".trim().toLowerCase();

          // Maskuje email pro Actions log (CI email leak fix) — nikdy nevypisuj
          // plny email do logu, jen prvni znak + domenu.
          function maskEmail(e) {
            if (!e) return e;
            const at = e.indexOf("@");
            if (at <= 0) return "***";
            return e.slice(0, 1) + "***@" + e.slice(at + 1);
          }

          const user = db.users.findOne({ _id: ObjectId(userId) }, { email: 1, username: 1 });
          if (!user) {
            print("CHYBA: ucet nenalezen pro _id=" + userId);
            quit(1);
          }
          print("Pred:  " + user.username + "  /  " + maskEmail(user.email));

          const clash = db.users.findOne(
            { email: newEmail, _id: { \$ne: ObjectId(userId) } },
            { username: 1 },
          );
          if (clash) {
            print("CHYBA: email uz pouziva ucet '" + clash.username + "' — zmena neprovedena.");
            quit(1);
          }

          const r = db.users.updateOne(
            { _id: ObjectId(userId) },
            { \$set: { email: newEmail, emailVerified: true, emailVerifiedAt: new Date() } },
          );
          print("matched=" + r.matchedCount + " modified=" + r.modifiedCount);
          print("--- vysledek:");
          const after = db.users.findOne(
            { _id: ObjectId(userId) },
            { email: 1, username: 1, emailVerified: 1 },
          );
          printjson({
            username: after.username,
            email: maskEmail(after.email),
            emailVerified: after.emailVerified,
          });
          EOF
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < set-email.js
