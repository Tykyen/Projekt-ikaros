name: Import Matrix Pravidla B (one-off)

# Importuje odlozeny subsystem "Pravidla B" (programy/lore stranky + staty -> PJ-AKJ
# zalozky) dle rucniho roztrideni uzivatele (Excel). Data: migration/f-pravidla-b-data.json.gz.
# Logika: migration/f-pravidla-b.js. Spec: docs/arch/migration-matrix/f-pravidla-b.md (FE repo).
#
# UPSERT podle slugu (prod != dump, lekce F12):
#   stranka:  neexistuje->create ; placeholder->fill ; realny obsah->KONFLIKT (neprepise)
#   rulebook: existuje->fill ; neexistuje->skip (ceka na rulebook seed)
#   AKJ:      staty-X -> PJ-only akjTab (access:[]) na strance X
# Idempotentni (_mig:fpravidlab, _migPravBBefore zaloha) -> cisty rollback.
#
# Spusteni: Actions -> tento workflow -> Run workflow:
#   mode = dry-run             -> jen vypise create/fill/konflikt/skip (NIC nezapise)
#   mode = import   + IMPORT   -> opravdu vlozi/vyplni
#   mode = rollback + ROLLBACK -> smaze vlozene + obnovi vyplnene + odebere AKJ zalozky

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'rezim'
        type: choice
        options: [dry-run, import, rollback]
        default: dry-run
      confirm:
        description: 'pro import napis IMPORT, pro rollback ROLLBACK'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (kvuli datovemu souboru + logice)
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Build mongosh script
        env:
          MODE: ${{ github.event.inputs.mode }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -e
          WORLD="6d6174726978000000000001"
          if [ "$MODE" = "import" ] && [ "$CONFIRM" != "IMPORT" ]; then echo "CHYBA: import vyzaduje confirm=IMPORT"; exit 1; fi
          if [ "$MODE" = "rollback" ] && [ "$CONFIRM" != "ROLLBACK" ]; then echo "CHYBA: rollback vyzaduje confirm=ROLLBACK"; exit 1; fi
          {
            echo "const MODE=\"$MODE\";"
            echo "const WORLD=\"$WORLD\";"
            echo "const data ="
            gunzip -c migration/f-pravidla-b-data.json.gz
            echo ";"
            cat migration/f-pravidla-b.js
          } > script.js
          echo "skript pripraven ($(du -h script.js | cut -f1)), mode=$MODE"

      - name: Run on newmatrix
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < script.js
