name: Deploy to Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Deployment environment
        required: true
        default: production
        type: choice
        options:
          - production

env:
  DEPLOY_PATH: /opt/projekt-ikaros-be
  COMPOSE_FILE: docker-compose.prod.yml

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      contents: read
      actions: read # 23.7 — gate čte stav CI běhů přes gh api

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 23.7 — „deploy jen po zelené": deploy je workflow_dispatch bez vazby na
      # CI. Tenhle krok najde CI běh pro přesně tenhle commit (head_sha=HEAD) a
      # pustí dál JEN když je completed+success. Jinak deploy padne dřív, než se
      # sáhne na server. Po pushi na main nech CI doběhnout, teprve pak deploy.
      - name: Require green CI for HEAD
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(git rev-parse HEAD)
          echo "HEAD = $SHA"
          RUN=$(gh api "repos/${{ github.repository }}/actions/workflows/ci.yml/runs?head_sha=$SHA&per_page=1" \
            --jq '.workflow_runs[0] | "\(.status) \(.conclusion) \(.html_url)"' 2>/dev/null || echo "none none none")
          STATUS=$(printf '%s' "$RUN" | awk '{print $1}')
          CONCLUSION=$(printf '%s' "$RUN" | awk '{print $2}')
          URL=$(printf '%s' "$RUN" | awk '{print $3}')
          echo "CI: status=$STATUS conclusion=$CONCLUSION $URL"
          if [ "$STATUS" != "completed" ] || [ "$CONCLUSION" != "success" ]; then
            echo "::error::Deploy zablokován — CI pro HEAD ($SHA) není zelené (status=$STATUS, conclusion=$CONCLUSION). Počkej na zelenou CI a spusť deploy znovu."
            exit 1
          fi

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "mkdir -p '${{ env.DEPLOY_PATH }}'"

      - name: Copy files to server
        run: |
          rsync -avz --delete \
            -e "ssh -p ${{ vars.SERVER_PORT }}" \
            --exclude '.git' \
            --exclude 'node_modules' \
            --exclude 'dist' \
            --exclude 'coverage' \
            --exclude '.env' \
            ./ ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }}:${{ env.DEPLOY_PATH }}/

      # 24.1 — razítko deploye pro `/api/health`. Musí být SAMOSTATNÝ krok: heredoc
      # níž je quoted (<< 'EOF'), takže `$(date)` by se v něm neexpandovalo — a
      # odquotovat ho nelze, sypaly by se secrets obsahující `$`. `${{ }}` naopak
      # dosazuje Actions ještě před shellem, proto přes GITHUB_ENV.
      - name: Stamp build metadata
        run: echo "BUILT_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Create .env file on server
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cat > '${{ env.DEPLOY_PATH }}/.env'" << 'EOF'
          BACKEND_PORT=${{ vars.BACKEND_PORT }}
          FRONTEND_URL=${{ vars.FRONTEND_URL }}
          BACKEND_BASE_URL=${{ vars.BACKEND_BASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN=${{ vars.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_TTL_DAYS=${{ vars.JWT_REFRESH_TTL_DAYS }}
          ANON_SESSION_TTL=${{ vars.ANON_SESSION_TTL }}
          TOTP_ENC_KEY=${{ secrets.TOTP_ENC_KEY }}
          CLOUDINARY_URL=${{ secrets.CLOUDINARY_URL }}
          CLOUDINARY_CLOUD_NAME=${{ vars.CLOUDINARY_CLOUD_NAME }}
          TURNSTILE_SECRET=${{ secrets.TURNSTILE_SECRET }}
          VAPID_SUBJECT=${{ vars.VAPID_SUBJECT }}
          VAPID_PUBLIC_KEY=${{ vars.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
          MEILI_MASTER_KEY=${{ secrets.MEILI_MASTER_KEY }}
          SMTP_HOST=${{ vars.SMTP_HOST }}
          SMTP_PORT=${{ vars.SMTP_PORT }}
          SMTP_USER=${{ vars.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          MAIL_FROM=${{ vars.MAIL_FROM }}
          DELETION_HOLD_DAYS=${{ vars.DELETION_HOLD_DAYS }}
          EMBEDDING_GRANITE107_ENABLED=${{ vars.EMBEDDING_GRANITE107_ENABLED }}
          EMBEDDING_GRANITE278_ENABLED=${{ vars.EMBEDDING_GRANITE278_ENABLED }}
          DISCORD_ALERT_WEBHOOK=${{ secrets.DISCORD_ALERT_WEBHOOK }}
          DISCORD_EVENTS_WEBHOOK=${{ secrets.DISCORD_EVENTS_WEBHOOK }}
          SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          RSS_ALERT_MB=${{ vars.RSS_ALERT_MB }}
          IMAGE_SHA=${{ github.sha }}
          BUILT_AT=${{ env.BUILT_AT }}
          EOF

      - name: Validate deployment environment
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} 'DEPLOY_PATH="${{ env.DEPLOY_PATH }}" bash -se' << 'EOF'
          set -e
          cd "$DEPLOY_PATH"
          env_value() {
            sed -n "s/^$1=//p" .env | tail -n 1
          }
          JWT_SECRET="$(env_value JWT_SECRET)"
          JWT_REFRESH_SECRET="$(env_value JWT_REFRESH_SECRET)"
          MEILI_MASTER_KEY="$(env_value MEILI_MASTER_KEY)"
          test -n "$JWT_SECRET" || { echo "JWT_SECRET is missing"; exit 1; }
          test -n "$JWT_REFRESH_SECRET" || { echo "JWT_REFRESH_SECRET is missing"; exit 1; }
          test "${#MEILI_MASTER_KEY}" -ge 16 || { echo "MEILI_MASTER_KEY must be at least 16 bytes"; exit 1; }
          EOF

      - name: Build images
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} 'DEPLOY_PATH="${{ env.DEPLOY_PATH }}" COMPOSE_FILE="${{ env.COMPOSE_FILE }}" bash -se' << 'EOF'
            set -e
            cd "$DEPLOY_PATH"
            docker image prune -f
            docker compose -f "$COMPOSE_FILE" build
          EOF

      - name: Deploy
        run: |
          ssh -o ServerAliveInterval=30 -o ServerAliveCountMax=20 ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} 'DEPLOY_PATH="${{ env.DEPLOY_PATH }}" COMPOSE_FILE="${{ env.COMPOSE_FILE }}" bash -se' << 'EOF'
            set -e
            cd "$DEPLOY_PATH"
            docker compose -f "$COMPOSE_FILE" down --remove-orphans || true
            docker compose -f "$COMPOSE_FILE" up -d
            docker compose -f "$COMPOSE_FILE" ps
          EOF

      - name: Verify deployment
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} 'DEPLOY_PATH="${{ env.DEPLOY_PATH }}" COMPOSE_FILE="${{ env.COMPOSE_FILE }}" bash -se' << 'EOF'
            set -e
            cd "$DEPLOY_PATH"
            sleep 15
            docker compose -f "$COMPOSE_FILE" ps
            TOTAL=$(docker compose -f "$COMPOSE_FILE" ps -q | wc -l)
            RUNNING=$(docker compose -f "$COMPOSE_FILE" ps --status running -q | wc -l)
            if [ "$TOTAL" -ne "$RUNNING" ]; then
              docker compose -f "$COMPOSE_FILE" logs --tail=80
              exit 1
            fi
          EOF

      # 23.7 — release evidence: co a kdy se nasadilo (sha + čas + kdo) do run
      # summary. Spolu s novinka-changelogem (25.4) tvoří stopu releasu.
      - name: Release evidence
        if: success()
        run: |
          {
            echo "### 🚀 Release evidence (BE)"
            echo ""
            echo "| Pole | Hodnota |"
            echo "|---|---|"
            echo "| commit | \`$(git rev-parse HEAD)\` |"
            echo "| ref | ${{ github.ref_name }} |"
            echo "| environment | ${{ github.event.inputs.environment }} |"
            echo "| deployed_at (UTC) | $(date -u +%Y-%m-%dT%H:%M:%SZ) |"
            echo "| actor | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Cleanup old Docker images
        if: always()
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "docker image prune -f"
