name: Fix Matrix broken links F5 (one-off)

# Prepise broken interni odkazy v Page.content na spravny slug (postava-mismatch:
# stary slug jmeno-prijmeni -> realny slug postavy, vc. prezdivek abi/medak/archie).
# Mapa: migration/f5-links.json.gz (14 mapovani). Logika: migration/f5-fix.js.
# Prepisuje na 3 mistech: Page.content + Page.table (headers/values) + Page.akjTabs
# (contentOverride.content). Slugy [a-z0-9-]; regex (href="/?<old>") zachova "/"
# prefix, kratsi slug netknut. Content je HTML (po fix-content-html), regex cili
# atribut href="...". Per-pole zaloha (_migF5Before/_migF5TableBefore/_migF5AkjBefore)
# jen jednou -> idempotentni i napric behy. Filtr _mig.
#
# dry-run: spocita stranky/odkazy + vzorek.   fix: prepise + zaloha + flag _migF5Links.
# rollback: vrati vsechna 3 pole ze zaloh, smaze flagy.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'rezim'
        type: choice
        options: [dry-run, fix, rollback]
        default: dry-run
      confirm:
        description: 'pro fix napis FIX, pro rollback ROLLBACK'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (data)
        uses: actions/checkout@v7
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Build mongosh script
        env:
          MODE: ${{ github.event.inputs.mode }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -e
          if [ "$MODE" = "rollback" ]; then
            if [ "$CONFIRM" != "ROLLBACK" ]; then echo "CHYBA: rollback vyzaduje confirm=ROLLBACK"; exit 1; fi
            {
              echo "(function(){"
              echo "var MAP=[];"
              cat migration/f5-fix.js
              echo "runRollback();"
              echo "})();"
            } > script.js
          else
            DRY=true
            if [ "$MODE" = "fix" ]; then
              if [ "$CONFIRM" != "FIX" ]; then echo "CHYBA: fix vyzaduje confirm=FIX"; exit 1; fi
              DRY=false
            fi
            {
              echo "(function(){"
              echo "var DRY=$DRY;"
              echo "var MAP ="
              gunzip -c migration/f5-links.json.gz
              echo ";"
              cat migration/f5-fix.js
              echo "runFix();"
              echo "})();"
            } > script.js
          fi
          echo "skript pripraven ($(wc -l < script.js) radku)"
      - name: Run on newmatrix
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < script.js
