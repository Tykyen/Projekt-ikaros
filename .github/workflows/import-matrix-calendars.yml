name: Import Matrix kalendare F7 (one-off)

# Naveze per-entita kalendarni udalosti na postavy/NPC/lokace (calendar subdoc).
# Data: migration/f7-calendars.json.gz = [{slug, events:[CalendarEvent + _mig:'f7']}].
# Cil: character_calendars (keyed characterId). Slug -> characters._id -> upsert.
#
# Udalosti se MERGUJI podle event.id (idempotentni, nezahodi rucni eventy).
# start/end uz jsou FantasyDate {year, monthIndex(0-based), day} (gregorian).
# Marker _mig:'f7' na kazde udalosti. Rollback: $pull tyto eventy + smaz prazdne migracni docs.
# Spec: docs/arch/migration-matrix/f7-calendars.md (FE repo).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'rezim'
        type: choice
        options: [dry-run, import, rollback]
        default: dry-run
      confirm:
        description: 'pro import napis IMPORT, pro rollback ROLLBACK'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (kvuli datovemu souboru)
        uses: actions/checkout@v4
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Build mongosh script
        env:
          MODE: ${{ github.event.inputs.mode }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -e
          WORLD="6d6174726978000000000001"
          if [ "$MODE" = "rollback" ]; then
            if [ "$CONFIRM" != "ROLLBACK" ]; then echo "CHYBA: rollback vyzaduje confirm=ROLLBACK"; exit 1; fi
            {
              echo '(function(){'
              echo '  const pull=db.character_calendars.updateMany({},{$pull:{events:{_mig:"f7"}}});'
              echo '  const del=db.character_calendars.deleteMany({_mig:"f7",events:{$size:0}});'
              echo '  print("ROLLBACK: dotcenych dokumentu="+pull.modifiedCount+", smazano prazdnych migracnich="+del.deletedCount);'
              echo '})();'
            } > script.js
          else
            DRY=true
            if [ "$MODE" = "import" ]; then
              if [ "$CONFIRM" != "IMPORT" ]; then echo "CHYBA: import vyzaduje confirm=IMPORT"; exit 1; fi
              DRY=false
            fi
            {
              echo "const DRY=$DRY;"
              echo "const WORLD=\"$WORLD\";"
              echo "const docs ="
              gunzip -c migration/f7-calendars.json.gz
              echo ";"
              echo '(function(){'
              echo '  let oid=null; try{ oid=ObjectId(WORLD); }catch(e){}'
              echo '  function getPage(slug){'
              echo '    let p=db.pages.findOne({slug:slug,worldId:WORLD},{characterRef:1});'
              echo '    if(!p&&oid) p=db.pages.findOne({slug:slug,worldId:oid},{characterRef:1});'
              echo '    if(!p) p=db.pages.findOne({slug:slug},{characterRef:1});'
              echo '    return p;'
              echo '  }'
              echo '  function getCharBySlug(slug){'
              echo '    let c=db.characters.findOne({slug:slug,worldId:WORLD},{_id:1});'
              echo '    if(!c&&oid) c=db.characters.findOne({slug:slug,worldId:oid},{_id:1});'
              echo '    if(!c) c=db.characters.findOne({slug:slug},{_id:1});'
              echo '    return c;'
              echo '  }'
              echo '  // Primarne Page.characterRef.characterId (Page.slug je stabilni), fallback Character.slug.'
              echo '  function resolve(slug){'
              echo '    const p=getPage(slug);'
              echo '    if(p&&p.characterRef&&p.characterRef.characterId) return {cid:p.characterRef.characterId,src:"page"};'
              echo '    const c=getCharBySlug(slug);'
              echo '    if(c) return {cid:String(c._id),src:"char"};'
              echo '    return {cid:null,why:(p?"Page bez characterRef":"Page chybi")};'
              echo '  }'
              echo '  const now=new Date();'
              echo '  let found=0,noChar=0,created=0,merged=0,skipExisting=0,addedEv=0,hadManual=0,viaPage=0,viaChar=0;'
              echo '  const missing=[]; let calWorldSample=null;'
              echo '  for(const d of docs){'
              echo '    const r=resolve(d.slug);'
              echo '    if(!r.cid){noChar++;missing.push({slug:d.slug,why:r.why});continue;}'
              echo '    found++; if(r.src==="page")viaPage++;else viaChar++;'
              echo '    const cid=String(r.cid);'
              echo '    const cal=db.character_calendars.findOne({characterId:cid});'
              echo '    if(cal&&calWorldSample===null) calWorldSample=(typeof cal.worldId)+" / "+String(cal.worldId);'
              echo '    if(!cal){'
              echo '      created++; addedEv+=d.events.length;'
              echo '      if(!DRY) db.character_calendars.insertOne({characterId:cid,worldId:WORLD,color:"#3B82F6",displaySettings:{},events:d.events,_mig:"f7",createdAt:now,updatedAt:now});'
              echo '    } else {'
              echo '      const have=new Set((cal.events||[]).map(function(e){return e.id;}));'
              echo '      if((cal.events||[]).length>0 && !cal._mig) hadManual++;'
              echo '      const toAdd=d.events.filter(function(e){return !have.has(e.id);});'
              echo '      if(toAdd.length){ merged++; addedEv+=toAdd.length; if(!DRY) db.character_calendars.updateOne({characterId:cid},{$push:{events:{$each:toAdd}},$set:{updatedAt:now}}); }'
              echo '      else skipExisting++;'
              echo '    }'
              echo '  }'
              echo '  print("=== F7 kalendare "+(DRY?"DRY-RUN":"IMPORT")+" ===");'
              echo '  print("entit v souboru: "+docs.length+" | nalezeno: "+found+" (pres Page "+viaPage+", pres Character "+viaChar+") | nenalezeno: "+noChar);'
              echo '  print("existujici character_calendars.worldId vzorek: "+(calWorldSample||"(zadny existujici calendar)"));'
              echo '  print("calendar: vytvoreno="+created+" merged="+merged+" beze zmeny="+skipExisting+" | udalosti pridano="+addedEv);'
              echo '  print("pozor - entit s rucne zalozenym calendarem (merge je nezahodi): "+hadManual);'
              echo '  if(missing.length) print("NENALEZENO (slug -> duvod): "+missing.map(function(m){return m.slug+" ("+m.why+")";}).join(", "));'
              echo '  // DIAG: pro nenalezene dohledej kandidaty v prod DB podle jmena (Page title / Character name).'
              echo '  if(DRY && missing.length){'
              echo '    const NAMES={john:"John",kraven:"Pumí stín",mingguo:"Li Mingguo",rusko:"Rusko",cina:"Čína",britanie:"Británie",indie:"Indie",nusa:"NUSA","vnejsi-sabska-rise":"Vnější Sábská říše","samansky-stat":"Šamanský stát"};'
              echo '    print("--- DIAG kandidati (slug -> prod entity podle jmena) ---");'
              echo '    for(const m of missing){'
              echo '      const nm=NAMES[m.slug]||m.slug;'
              echo '      const rx=new RegExp("^"+nm.replace(/[.*+?^${}()|[\\]\\\\]/g,"\\\\$&"),"i");'
              echo '      const pgs=db.pages.find({title:rx},{slug:1,title:1,characterRef:1}).limit(4).toArray();'
              echo '      const chs=db.characters.find({name:rx},{slug:1,name:1}).limit(4).toArray();'
              echo '      const pgStr=pgs.map(function(p){return p.slug+(p.characterRef&&p.characterRef.characterId?"[ref]":"[bez ref]");}).join(", ")||"-";'
              echo '      const chStr=chs.map(function(c){return c.slug;}).join(", ")||"-";'
              echo '      print("  "+m.slug+" ~ \""+nm+"\" | pages: "+pgStr+" | characters: "+chStr);'
              echo '    }'
              echo '  }'
              echo '})();'
            } > script.js
          fi
          echo "skript pripraven ($(du -h script.js | cut -f1))"
      - name: Run on newmatrix
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < script.js
