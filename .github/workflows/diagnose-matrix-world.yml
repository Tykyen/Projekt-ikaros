name: Diagnose Matrix world (read-only)

# READ-ONLY diagnostika: proc se svet 'matrix' nezobrazuje a uzivatel neni PJ.
# Vypise vsechny svety, matrix data, memberships. NIC nemeni.

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Build mongosh script
        run: |
          {
            echo 'print("===== VSECHNY SVETY (worlds) =====");'
            echo 'db.worlds.find({}).forEach(w=>print(JSON.stringify({_id:String(w._id),slug:w.slug,name:w.name,ownerId:String(w.ownerId),isPublic:w.isPublic})));'
            echo 'print("");print("===== Hleda se svet matrix =====");'
            echo 'const mw=db.worlds.findOne({slug:"matrix"});'
            echo 'print(mw?("NALEZEN: _id="+String(mw._id)+" name="+mw.name+" ownerId="+String(mw.ownerId)+" isPublic="+mw.isPublic):"!!! SVET slug=matrix NEEXISTUJE !!!");'
            echo 'print("");print("===== Data podle worldId =====");'
            echo 'print("pages worldId=\"matrix\" (slug): "+db.pages.countDocuments({worldId:"matrix"}));'
            echo 'print("characters worldId=\"matrix\" (slug): "+db.characters.countDocuments({worldId:"matrix"}));'
            echo 'if(mw){print("pages worldId=<matrix _id>: "+db.pages.countDocuments({worldId:String(mw._id)}));}'
            echo 'print("");print("===== distinct worldId v pages (top) =====");'
            echo 'db.pages.aggregate([{$group:{_id:"$worldId",n:{$sum:1}}},{$sort:{n:-1}},{$limit:8}]).forEach(g=>print("  "+g._id+": "+g.n));'
            echo 'print("");print("===== memberships pro matrix =====");'
            echo 'if(mw){db.world_memberships.find({worldId:String(mw._id)}).forEach(m=>print("  user="+String(m.userId)+" role="+m.role));}'
            echo 'print("memberships worldId=\"matrix\" (slug): "+db.world_memberships.countDocuments({worldId:"matrix"}));'
            echo 'print("");print("===== Tyky (tykytanjunior) memberships =====");'
            echo 'const tyky=db.users.findOne({email:/tykytanjunior/i})||db.users.findOne({username:/tyky/i});'
            echo 'if(tyky){print("Tyky _id="+String(tyky._id));db.world_memberships.find({userId:String(tyky._id)}).forEach(m=>print("  world="+m.worldId+" role="+m.role));}else print("Tyky NENALEZEN");'
            echo 'print("");print("===== world_settings matrix =====");'
            echo 'if(mw){print("settings: "+(db.world_settings.countDocuments({worldId:String(mw._id)})||db.worldsettings.countDocuments({worldId:String(mw._id)})));}'
          } > script.js
          echo "skript pripraven"
      - name: Run on newmatrix
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < script.js
