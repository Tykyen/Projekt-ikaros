name: Import Matrix timeline+zvuky F8 (one-off)

# Naveze TimelineEvents (97) -> timeline_events + sounds (9) -> sounds.
# Data: migration/f8-data.json.gz = {timeline[],sounds[]} (obrazky uz na Cloudinary z f8-upload.mjs).
# Timeline: title=text, month/day null->1, link/page/X->pageSlug. Sounds: ciselne enumy->string, per-world matrix.
# worldId="6d61..01", sounds createdBy=Tyky+status=active, marker _mig:'f8'. Upsert podle _id (idempotent).
# Logika v migration/f8-import.js. Spec: docs/arch/migration-matrix/f8-timeline-sounds.md (FE repo).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'rezim'
        type: choice
        options: [dry-run, import, rollback]
        default: dry-run
      confirm:
        description: 'pro import napis IMPORT, pro rollback ROLLBACK'
        required: false
        default: ''

jobs:
  run:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout (kvuli datovemu souboru)
        uses: actions/checkout@v4
      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ vars.SERVER_PORT }} -H ${{ vars.SERVER_HOST }} >> ~/.ssh/known_hosts
      - name: Build mongosh script
        env:
          MODE: ${{ github.event.inputs.mode }}
          CONFIRM: ${{ github.event.inputs.confirm }}
        run: |
          set -e
          WORLD="6d6174726978000000000001"
          if [ "$MODE" = "rollback" ]; then
            if [ "$CONFIRM" != "ROLLBACK" ]; then echo "CHYBA: rollback vyzaduje confirm=ROLLBACK"; exit 1; fi
            {
              echo '(function(){'
              echo '  const cols=["timeline_events","sounds"];'
              echo '  let t=0;'
              echo '  for(const n of cols){ const r=db.getCollection(n).deleteMany({_mig:"f8"}); print(n+": smazano "+r.deletedCount); t+=r.deletedCount; }'
              echo '  print("ROLLBACK F8 celkem smazano: "+t);'
              echo '})();'
            } > script.js
          else
            DRY=true
            if [ "$MODE" = "import" ]; then
              if [ "$CONFIRM" != "IMPORT" ]; then echo "CHYBA: import vyzaduje confirm=IMPORT"; exit 1; fi
              DRY=false
            fi
            {
              echo "const DRY=$DRY;"
              echo "const WORLD=\"$WORLD\";"
              echo "const data ="
              gunzip -c migration/f8-data.json.gz
              echo ";"
              cat migration/f8-import.js
            } > script.js
          fi
          echo "skript pripraven ($(du -h script.js | cut -f1))"
      - name: Run on newmatrix
        run: |
          ssh ${{ vars.SSH_USER }}@${{ vars.SERVER_HOST }} -p ${{ vars.SERVER_PORT }} "cd /opt/projekt-ikaros-be && docker compose exec -T mongo mongosh 'mongodb://localhost:27017/ikaros?replicaSet=rs0' --quiet" < script.js
